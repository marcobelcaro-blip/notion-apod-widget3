<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASA APOD Widget</title>

<style>
:root {
    --bg: #0b1020;
    --card: #131a2f;
    --text: #ffffff;
    --muted: #a9b2c7;
    --accent: #4f8cff;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: transparent;
    font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
}

.widget {
    width: 100%;
    max-width: 800px;
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    color: var(--text);
    box-shadow:
        0 10px 30px rgba(0,0,0,.25);
}

.media-container {
    width: 100%;
    background: #000;
    position: relative;
}

.media-container img,
.media-container iframe {
    width: 100%;
    display: block;
    border: none;
}

.content {
    padding: 18px;
}

.badge {
    display: inline-block;
    background: rgba(79,140,255,.15);
    color: #8fb5ff;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    margin-bottom: 10px;
}

h1 {
    font-size: 1.15rem;
    line-height: 1.3;
    margin-bottom: 8px;
}

.date {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 12px;
}

.description {
    color: #d4d8e3;
    line-height: 1.55;
    font-size: 0.95rem;

    display: -webkit-box;
    -webkit-box-orient: vertical;
    line-clamp: 6;
    -webkit-line-clamp: 6;
    overflow: hidden;
}

.footer {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
}

.loading,
.error {
    padding: 40px 20px;
    text-align: center;
}

.loading {
    color: white;
}

.error {
    color: #ff9f9f;
}

@media (max-width: 600px) {
    h1 {
        font-size: 1rem;
    }

    .content {
        padding: 14px;
    }

    .description {
        font-size: 0.9rem;
    }
<style>
:root {
    --bg: #0b1020;
    --card: #131a2f;
    --text: #ffffff;
    --muted: #a9b2c7;
    --accent: #4f8cff;
}
</style>
}
</style>
</head>

<body>

<div class="widget" id="widget">
    <div class="loading">Loading Astronomy Picture of the Day...</div>
</div>

<script>
const API_KEY = "DEMO_KEY";
// For higher rate limits, get a free API key from NASA:
// https://api.nasa.gov/

async function loadAPOD() {
    const widget = document.getElementById("widget");

    try {
        const response = await fetch(
            `https://api.nasa.gov/planetary/apod?api_key=${API_KEY}`
        );

        if (!response.ok) {
            throw new Error("Failed to load APOD");
        }

        const data = await response.json();

        let mediaHtml = "";

        if (data.media_type === "image") {
            mediaHtml = `
                <img
                    src="${data.url}"
                    alt="${escapeHtml(data.title)}"
                    loading="lazy"
                >
            `;
        } else if (data.media_type === "video") {
            mediaHtml = `
                <iframe
                    src="${data.url}"
                    allowfullscreen
                    style="aspect-ratio:16/9;"
                ></iframe>
            `;
        }

        widget.innerHTML = `
            <div class="media-container">
                ${mediaHtml}
            </div>

            <div class="content">
                <div class="badge">NASA APOD</div>

                <h1>${escapeHtml(data.title)}</h1>

                <div class="date">
                    ${new Date(data.date).toLocaleDateString(
                        undefined,
                        {
                            year: "numeric",
                            month: "long",
                            day: "numeric"
                        }
                    )}
                </div>

                <div class="description">
                    ${escapeHtml(data.explanation)}
                </div>

                <div class="footer">
                    <span>© NASA</span>

                    <a
                        href="https://apod.nasa.gov/apod/"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        Open APOD →
                    </a>
                </div>
            </div>
        `;
    } catch (err) {
        widget.innerHTML = `
            <div class="error">
                Unable to load today's APOD.
            </div>
        `;
        console.error(err);
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

loadAPOD();
</script>

</body>
</html>
